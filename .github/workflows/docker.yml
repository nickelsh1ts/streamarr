name: Streamarr Docker

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    name: Build & Publish Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            COMMIT_TAG=${{ github.sha }}
          tags: |
            nickelsh1ts/streamarr:latest
            nickelsh1ts/streamarr:${{ steps.version.outputs.version }}
            ghcr.io/nickelsh1ts/streamarr:latest
            ghcr.io/nickelsh1ts/streamarr:${{ steps.version.outputs.version }}

  discord:
    name: Send Discord Notification
    needs: build_and_push
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Get Build Job Status
        uses: technote-space/workflow-conclusion-action@v3
      - name: Combine Job Status
        id: status
        run: |
          failures=(neutral skipped timed_out action_required)
          status="$WORKFLOW_CONCLUSION"
          for failure in "${failures[@]}"; do
            if [ "$WORKFLOW_CONCLUSION" = "$failure" ]; then
              status="failure"
              break
            fi
          done
          echo "status=$status" >> "$GITHUB_OUTPUT"
      - name: Post Status to Discord
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ steps.status.outputs.status }}
          title: ${{ github.workflow }}
          nofail: true
